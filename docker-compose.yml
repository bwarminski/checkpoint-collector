# ABOUTME: Defines the collector stack that now lives in the sibling repo.
# ABOUTME: Runs Postgres, ClickHouse, and the collector together.
services:
  postgres:
    build:
      context: ./postgres
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "compute_query_id=on", "-c", "logging_collector=on", "-c", "log_destination=jsonlog", "-c", "log_directory=/var/log/postgresql", "-c", "log_filename=postgresql", "-c", "log_min_duration_statement=0"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkpoint_demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkpoint_demo"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    ports: ["5432:5432"]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ./collector/db/clickhouse:/docker-entrypoint-initdb.d:ro
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d:ro
    ports: ["8123:8123", "9000:9000"]

  collector:
    build:
      context: ./collector
    command: ["bundle", "exec", "ruby", "bin/collector"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/checkpoint_demo
      CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - postgres_logs:/var/log/postgresql:ro

volumes:
  postgres_data:
  postgres_logs:
